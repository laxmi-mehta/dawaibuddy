name: Lint (All)

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'backend/') || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/dev.txt
      - name: Install
        working-directory: backend
        run: pip install ruff black isort
      - name: Ruff
        working-directory: backend
        run: ruff check .
      - name: Black
        working-directory: backend
        run: black --check .
      - name: isort
        working-directory: backend
        run: isort --check-only .

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'frontend/') || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: ESLint
        working-directory: frontend
        run: npm run lint
      - name: Prettier
        working-directory: frontend
        run: npm run format:check

  security-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: pip-audit backend
        working-directory: backend
        run: |
          pip install pip-audit
          pip-audit -r requirements/base.txt || true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: npm audit frontend
        working-directory: frontend
        run: npm audit --audit-level=high || true
