name: Backend CI

on:
  push:
    branches:
      - main
      - "feature/backend-*"
      - "feature/devops-*"
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"

jobs:
  lint-and-check:
    name: Lint, Type Check & Django Checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dawaibuddy_test
          POSTGRES_USER: dawaibuddy
          POSTGRES_PASSWORD: dawaibuddy_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DJANGO_SECRET_KEY: ci-secret-key-not-for-production
      DJANGO_DEBUG: "True"
      DATABASE_URL: postgresql://dawaibuddy:dawaibuddy_password@localhost:5432/dawaibuddy_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/dev.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements/dev.txt

      - name: Ruff lint
        working-directory: backend
        run: ruff check .

      - name: Black format check
        working-directory: backend
        run: black --check .

      - name: isort check
        working-directory: backend
        run: isort --check-only .

      - name: MyPy type check
        working-directory: backend
        run: mypy apps config

      - name: Django system checks
        working-directory: backend
        run: python manage.py check --deploy --fail-level WARNING

      - name: Django migrations check
        working-directory: backend
        run: python manage.py migrate --run-syncdb
